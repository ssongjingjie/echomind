# EchoMind — Nginx 部署配置
# 将此文件放置到 /etc/nginx/sites-available/workingai.com.cn
# 然后执行: ln -s /etc/nginx/sites-available/workingai.com.cn /etc/nginx/sites-enabled/
# 最后执行: nginx -t && systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name workingai.com.cn www.workingai.com.cn;

    # 项目根目录（构建后的 dist 文件夹）
    root /var/www/echomind/dist;
    index index.html;

    # Gzip 压缩
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;

    # 静态资源缓存（带 hash 的文件）
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # 其他静态文件
    location / {
        expires 1h;
        add_header Cache-Control "public, must-revalidate";

        # SPA 路由回退 - 关键配置
        try_files $uri $uri/ /index.html;
    }

    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # 日志
    access_log /var/log/nginx/echomind_access.log;
    error_log /var/log/nginx/echomind_error.log;
}

